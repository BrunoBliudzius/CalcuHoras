<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Controle de Placas</title>

    <link rel="icon" href="/faviconCalchHoras.png" type="image/x-icon" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link href="/placasRes.css" rel="stylesheet" />
  </head>

  <body>
    <div class="container mt-5">
      <div class="card shadow p-4 form-container">
        <h3 class="mb-4">Controle Placas</h3>
        <a
          href="/CalcHorasTrabalhadas.html"
          class="btn btn-warning w-100 text-decoration-none"
        >
          Horas Extras
        </a>

        <!-- Formulário -->
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Placa</label>
            <input type="text" id="placa" class="form-control" />
          </div>

          <div class="col-md-4 d-flex align-items-end">
            <button class="btn btn-primary w-100" onclick="adicionar()">
              Adicionar
            </button>
          </div>
        </div>

        <!-- Tabela -->
        <div class="mt-4">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Data</th>
                <th>Placa</th>
              </tr>
            </thead>
            <tbody id="tabelaPlacas"></tbody>
          </table>
        </div>
        <h5 id="saldo">Saldo:</h5>
        <button class="btn btn-danger w-100" onclick="ResetarMes()">
          Resetar Mes
        </button>
      </div>
    </div>

    <script src="/placasRes.js"></script>
  </body>
</html>
